<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <title>تسجيل الدخول | My Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--primary:#6d5dfc;--primary2:#8b7cff;--danger:#dc2626;--shadow:0 24px 70px rgba(17,24,39,.12)}
    :root[data-theme="dark"]{--bg:#07101f;--card:#0f172a;--text:#f8fafc;--muted:#94a3b8;--line:#243044;--shadow:0 24px 70px rgba(0,0,0,.36)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:'Tajawal',sans-serif;background:radial-gradient(circle at 80% 10%,rgba(109,93,252,.16),transparent 35%),var(--bg);color:var(--text);display:grid;place-items:center;padding:24px}
    button,input{font:inherit}.auth-shell{width:min(100%,980px);display:grid;grid-template-columns:1.05fr .95fr;background:var(--card);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:var(--shadow)}
    .auth-brand{padding:46px;background:linear-gradient(145deg,#111b48,#6d5dfc);color:#fff;display:flex;flex-direction:column;justify-content:space-between;min-height:630px}.logo{display:flex;align-items:center;gap:12px}.logo-mark{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-weight:800}.brand-copy h1{font-size:clamp(34px,5vw,60px);line-height:1.15;margin:0 0 16px}.brand-copy p{font-size:18px;line-height:1.9;color:rgba(255,255,255,.78)}.mini-note{font-size:14px;color:rgba(255,255,255,.7)}
    .auth-panel{padding:38px;display:flex;flex-direction:column}.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:34px}.icon-btn,.back-btn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:14px;height:44px;padding:0 14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}.icon-btn{width:44px;justify-content:center}.auth-panel h2{font-size:30px;margin:0 0 8px}.sub{color:var(--muted);margin:0 0 24px;line-height:1.8}
    .tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border:1px solid var(--line);padding:5px;border-radius:14px;margin-bottom:24px}.tab{border:0;background:transparent;color:var(--muted);padding:11px;border-radius:10px;cursor:pointer;font-weight:700}.tab.active{background:var(--card);color:var(--text);box-shadow:0 5px 16px rgba(0,0,0,.08)}
    .field{display:grid;gap:8px;margin-bottom:16px}.field span{font-weight:700}.field input{width:100%;border:1px solid var(--line);background:transparent;color:var(--text);border-radius:14px;padding:14px 15px;outline:none}.field input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(109,93,252,.12)}
    .primary{border:0;border-radius:14px;padding:14px 18px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));font-weight:800;cursor:pointer;width:100%;margin-top:6px}.primary:disabled{opacity:.55;cursor:not-allowed}.status{min-height:48px;margin-top:16px;border-radius:14px;padding:12px 14px;display:none;line-height:1.7}.status.show{display:block}.status.error{background:rgba(220,38,38,.1);color:#ef4444}.status.ok{background:rgba(16,185,129,.1);color:#10b981}.config-note{margin-top:auto;color:var(--muted);font-size:13px;line-height:1.8;padding-top:24px}
    @media(max-width:760px){body{padding:0;background:var(--bg)}.auth-shell{grid-template-columns:1fr;border-radius:0;min-height:100vh;border:0}.auth-brand{display:none}.auth-panel{padding:26px 20px}.top-row{margin-bottom:28px}.auth-panel h2{font-size:28px}}
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-brand">
      <div class="logo"><div class="logo-mark">MF</div><strong>My Finance</strong></div>
      <div class="brand-copy"><h1>حسابك المالي، محفوظ ومتزامن.</h1><p>سجّل الدخول للوصول إلى بياناتك من الجوال والكمبيوتر مع مزامنة Firebase.</p></div>
      <div class="mini-note">My Finance • Personal Dashboard</div>
    </section>

    <section class="auth-panel">
      <div class="top-row">
        <span></span>
        <button class="icon-btn" id="themeBtn" type="button" aria-label="تغيير المظهر">◐</button>
      </div>

      <div>
        <h2 id="formTitle">تسجيل الدخول</h2>
        <p class="sub" id="formSubtitle">أدخل بريدك وكلمة المرور للمتابعة.</p>
      </div>

      <div class="tabs" role="tablist">
        <button class="tab active" data-mode="login" type="button">تسجيل الدخول</button>
        <button class="tab" data-mode="signup" type="button">إنشاء حساب</button>
      </div>

      <form id="authForm" novalidate>
        <label class="field">
          <span>البريد الإلكتروني</span>
          <input id="email" type="email" autocomplete="email" placeholder="name@example.com" required>
        </label>
        <label class="field">
          <span>كلمة المرور</span>
          <input id="password" type="password" autocomplete="current-password" minlength="6" placeholder="6 أحرف على الأقل" required>
        </label>
        <label class="field" id="confirmWrap" hidden>
          <span>تأكيد كلمة المرور</span>
          <input id="confirmPassword" type="password" autocomplete="new-password" minlength="6" placeholder="أعد كتابة كلمة المرور">
        </label>
        <button class="primary" id="submitBtn" type="submit">دخول</button>
      </form>

      <div class="status" id="status" aria-live="polite"></div>
      <p class="config-note">بعد نجاح تسجيل الدخول سيتم تحويلك تلقائيًا إلى لوحة التحكم.</p>
    </section>
  </main>

  <script>
    const $ = (s) => document.querySelector(s);
    const tabs = [...document.querySelectorAll('.tab')];
    let mode = 'login';
    let auth = null;
    let authApi = null;

    // UI must work even if Firebase fails to load.
    const savedTheme = localStorage.getItem('finance-theme') || 'light';
    document.documentElement.dataset.theme = savedTheme;

    $('#themeBtn').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('finance-theme', next);
    });

    function setMode(nextMode){
      mode = nextMode;
      tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
      const signup = mode === 'signup';
      $('#formTitle').textContent = signup ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
      $('#formSubtitle').textContent = signup ? 'أنشئ حسابًا لمزامنة بياناتك بين أجهزتك.' : 'أدخل بريدك وكلمة المرور للمتابعة.';
      $('#submitBtn').textContent = signup ? 'إنشاء الحساب' : 'دخول';
      $('#confirmWrap').hidden = !signup;
      $('#confirmPassword').required = signup;
      $('#password').autocomplete = signup ? 'new-password' : 'current-password';
      clearStatus();
    }

    tabs.forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));

    function showStatus(message, type='error'){
      const el = $('#status');
      el.textContent = message;
      el.className = `status show ${type}`;
    }
    function clearStatus(){
      $('#status').className = 'status';
      $('#status').textContent = '';
    }
    function friendlyError(error){
      const code = error?.code || '';
      if(code.includes('invalid-credential')) return 'البريد أو كلمة المرور غير صحيحة.';
      if(code.includes('email-already-in-use')) return 'هذا البريد مستخدم مسبقًا.';
      if(code.includes('weak-password')) return 'كلمة المرور ضعيفة. استخدم 6 أحرف على الأقل.';
      if(code.includes('invalid-email')) return 'صيغة البريد الإلكتروني غير صحيحة.';
      if(code.includes('too-many-requests')) return 'محاولات كثيرة. انتظر قليلًا ثم أعد المحاولة.';
      if(code.includes('operation-not-allowed')) return 'طريقة Email/Password غير مفعلة في Firebase.';
      if(code.includes('network-request-failed')) return 'تعذر الاتصال بالإنترنت.';
      return `حدث خطأ في تسجيل الدخول (${code || 'unknown'}).`;
    }

    const firebaseConfig = {
  apiKey: "AIzaSyDp6RHQkVZNPXXGPguwwNCzONYC4uAQee8",
  authDomain: "monthlyexpenses-2e3f4.firebaseapp.com",
  databaseURL: "https://monthlyexpenses-2e3f4-default-rtdb.firebaseio.com",
  projectId: "monthlyexpenses-2e3f4",
  storageBucket: "monthlyexpenses-2e3f4.firebasestorage.app",
  messagingSenderId: "14644698781",
  appId: "1:14644698781:web:5e20b193bd68de9d5dbe74",
  measurementId: "G-2M497V55CC"
};

    async function initFirebase(){
      try {
        const appMod = await import('https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js');
        const authMod = await import('https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js');
        const app = appMod.initializeApp(firebaseConfig);
        auth = authMod.getAuth(app);
        authApi = authMod;

        authMod.onAuthStateChanged(auth, (user) => {
          if(user){
            showStatus('تم تسجيل الدخول. جارٍ فتح لوحة التحكم...', 'ok');
            setTimeout(() => location.replace('dashboard.html'), 350);
          }
        });
      } catch (error) {
        console.error(error);
        showStatus('تعذر الاتصال بخدمة Firebase. تحقق من الإنترنت ثم أعد المحاولة.', 'error');
      }
    }

    $('#authForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      clearStatus();

      const email = $('#email').value.trim();
      const password = $('#password').value;
      const confirm = $('#confirmPassword').value;

      if(!email || password.length < 6){
        showStatus('أدخل بريدًا صحيحًا وكلمة مرور من 6 أحرف على الأقل.');
        return;
      }
      if(mode === 'signup' && password !== confirm){
        showStatus('كلمتا المرور غير متطابقتين.');
        return;
      }
      if(!auth || !authApi){
        showStatus('لم يكتمل الاتصال بـ Firebase بعد. انتظر لحظة ثم أعد المحاولة.');
        return;
      }

      const btn = $('#submitBtn');
      btn.disabled = true;
      btn.textContent = 'جارٍ التنفيذ...';
      try {
        if(mode === 'signup'){
          await authApi.createUserWithEmailAndPassword(auth, email, password);
        } else {
          await authApi.signInWithEmailAndPassword(auth, email, password);
        }
      } catch (error) {
        showStatus(friendlyError(error));
        btn.disabled = false;
        btn.textContent = mode === 'signup' ? 'إنشاء الحساب' : 'دخول';
      }
    });

    initFirebase();
  </script>
</body>
</html>
